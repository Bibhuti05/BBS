    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#fef2f2',
                100: '#fee2e2',
                200: '#fecaca',
                300: '#fca5a5',
                400: '#f87171',
                500: '#ef4444',
                600: '#dc2626',
                700: '#b91c1c',
                800: '#991b1b',
                900: '#7f1d1d',
                950: '#450a0a',
              },
              dark: {
                bg: '#18181b',
                card: '#27272a',
                text: '#f8fafc',
              },
              light: {
                bg: '#f8fafc',
                card: '#ffffff',
                text: '#0f172a',
              }
            },
            animation: {
              blob: "blob 7s infinite",
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'spin-slow': 'spin 12s linear infinite',
            },
            keyframes: {
              blob: {
                "0%": {
                  transform: "translate(0px, 0px) scale(1)",
                },
                "33%": {
                  transform: "translate(30px, -50px) scale(1.1)",
                },
                "66%": {
                  transform: "translate(-20px, 20px) scale(0.9)",
                },
                "100%": {
                  transform: "translate(0px, 0px) scale(1)",
                },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
          },
        },
      }
    </script>
    <style>
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #ef4444;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #dc2626;
      }
      
      /* Utilities for the spotlight effect */
      .card-spotlight {
        background-color: rgba(255, 255, 255, 0.1); 
        position: relative;
        overflow: hidden;
      }
      
      .card-spotlight::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          800px circle at var(--mouse-x, 0) var(--mouse-y, 0),
          rgba(239, 68, 68, 0.06),
          transparent 40%
        );
        z-index: 1;
        opacity: 0;
        transition: opacity 0.5s;
        pointer-events: none;
      }
      
      .card-spotlight:hover::before {
        opacity: 1;
      }

      .card-spotlight-border {
         position: absolute;
         inset: 0;
         pointer-events: none;
         border-radius: inherit;
         z-index: 2;
         background: radial-gradient(
           600px circle at var(--mouse-x, 0) var(--mouse-y, 0),
           rgba(239, 68, 68, 0.3),
           transparent 40%
         );
         -webkit-mask: 
           linear-gradient(#fff 0 0) content-box, 
           linear-gradient(#fff 0 0);
         mask: 
           linear-gradient(#fff 0 0) content-box, 
           linear-gradient(#fff 0 0);
         -webkit-mask-composite: xor;
         mask-composite: exclude;
         opacity: 0;
         transition: opacity 0.5s;
      }

      .card-spotlight:hover .card-spotlight-border {
        opacity: 1;
      }

      /* ── Radiant button glow ───────────────────────────────────────────── */
      .btn-radiant {
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }

      .btn-radiant::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -20%;
        transform: translateX(-50%) scaleX(0.5);
        width: 120%;
        height: 120%;
        border-radius: inherit;
        background: radial-gradient(
          ellipse 80% 60% at 50% 100%,
          rgba(255, 255, 255, 0.22) 0%,
          rgba(239, 68, 68, 0.12) 40%,
          transparent 75%
        );
        opacity: 0;
        transition: opacity 0.35s ease, transform 0.35s ease;
        pointer-events: none;
        z-index: 1;
      }

      .btn-radiant:hover::after {
        opacity: 1;
        transform: translateX(-50%) scaleX(1);
      }

      @keyframes radiantPulse {
        0%   { opacity: 0.55; transform: translateX(-50%) scaleX(1) scaleY(0.9); }
        50%  { opacity: 0.85; transform: translateX(-50%) scaleX(1.05) scaleY(1.05); }
        100% { opacity: 0.55; transform: translateX(-50%) scaleX(1) scaleY(0.9); }
      }

      .btn-radiant:hover::after {
        animation: radiantPulse 1.8s ease-in-out infinite;
      }

      /* ── Nav tab radiant glow ──────────────────────────────────────────── */
      .nav-radiant {
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }

      .nav-radiant::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -10%;
        transform: translateX(-50%) scaleX(0.4);
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: radial-gradient(
          ellipse 70% 50% at 50% 100%,
          rgba(239, 68, 68, 0.28) 0%,
          rgba(239, 68, 68, 0.08) 55%,
          transparent 80%
        );
        opacity: 0;
        transition: opacity 0.3s ease, transform 0.3s ease;
        pointer-events: none;
        z-index: 0;
      }

      /* Hover state — full bloom */
      .nav-radiant:hover::after {
        opacity: 1;
        transform: translateX(-50%) scaleX(1);
        animation: navRadiantPulse 2s ease-in-out infinite;
      }

      /* Active state — always visible, dimmer */
      .nav-radiant-active::after {
        opacity: 0.6;
        transform: translateX(-50%) scaleX(1);
      }

      @keyframes navRadiantPulse {
        0%   { opacity: 0.7;  transform: translateX(-50%) scaleX(1)    scaleY(0.9); }
        50%  { opacity: 1;    transform: translateX(-50%) scaleX(1.08) scaleY(1.08); }
        100% { opacity: 0.7;  transform: translateX(-50%) scaleX(1)    scaleY(0.9); }
      }
    </style>
