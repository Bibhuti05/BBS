    <style>
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #ef4444;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #dc2626;
      }
      
      /* Utilities for the spotlight effect */
      .card-spotlight {
        background-color: rgba(255, 255, 255, 0.1); 
        position: relative;
        overflow: hidden;
      }
      
      .card-spotlight::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          800px circle at var(--mouse-x, 0) var(--mouse-y, 0),
          rgba(239, 68, 68, 0.06),
          transparent 40%
        );
        z-index: 1;
        opacity: 0;
        transition: opacity 0.5s;
        pointer-events: none;
      }
      
      .card-spotlight:hover::before {
        opacity: 1;
      }

      .card-spotlight-border {
         position: absolute;
         inset: 0;
         pointer-events: none;
         border-radius: inherit;
         z-index: 2;
         background: radial-gradient(
           600px circle at var(--mouse-x, 0) var(--mouse-y, 0),
           rgba(239, 68, 68, 0.3),
           transparent 40%
         );
         -webkit-mask: 
           linear-gradient(#fff 0 0) content-box, 
           linear-gradient(#fff 0 0);
         -webkit-mask-composite: xor;
         mask-composite: exclude;
         opacity: 0;
         transition: opacity 0.5s;
      }

      .card-spotlight:hover .card-spotlight-border {
        opacity: 1;
      }

      .animated-gradient {
        background: radial-gradient(circle at 50% 50%, rgba(239, 68, 68, 0.8), transparent 60%);
        background-size: 200% 200%;
        animation: gradientOrbit 12s ease-in-out infinite;
      }

      @keyframes gradientOrbit {
        0%   { background-position: 0% 50%; }
        25%  { background-position: 100% 0%; }
        50%  { background-position: 100% 100%; }
        75%  { background-position: 0% 100%; }
        100% { background-position: 0% 50%; }
      }

      .click-shockwave {
        position: fixed;
        pointer-events: none;
        z-index: 9998;
        width: 20px;
        height: 20px;
        margin-left: -10px;
        margin-top: -10px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.6);
        animation: shockwaveExpand 500ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes shockwaveExpand {
        0% {
          transform: scale(1);
          opacity: 1;
          border-width: 3px;
        }
        100% {
          transform: scale(6);
          opacity: 0;
          border-width: 0.5px;
        }
      }

      .click-skill-pill {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
        height: 40px;
        padding: 0 16px;
        border-radius: 9999px;
        background: rgba(0,0,0,0.4);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: transform 200ms cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease-out;
      }

      .click-skill-pill--pulse {
        transition: transform 120ms cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s ease-out;
      }
    </style>
